[pytest]
# Jalankan dari root folder lockerapp/
# Contoh: pytest -v

testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Tampilkan print() dalam test (berguna untuk debug)
# Hilangkan -s jika tidak mau lihat output
addopts = -v --tb=short

# Marker kustom — pakai ini untuk filter test tertentu
# Contoh: pytest -m security
markers =
    security: test yang berkaitan dengan keamanan kriptografi
    edge: edge case dan input tak terduga
    integration: test end-to-end kunci→buka